{% if not helpers.empty('OPNsense.beepbeep.general.Enabled') %}
[general]
enabled=1
start_beep={{ OPNsense.beepbeep.general.StartBeep|default("default") }}
stop_beep={{ OPNsense.beepbeep.general.StopBeep|default("default") }}
start_beep_custom={{ OPNsense.beepbeep.general.StartBeepCustom|default("") }}
stop_beep_custom={{ OPNsense.beepbeep.general.StopBeepCustom|default("") }}
{% else %}
[general]
enabled=0
{% endif %}
